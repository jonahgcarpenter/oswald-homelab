apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-ui-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`longhorn.home.jonahsserver.com`)
      kind: Rule
      services:
        - name: longhorn-frontend
          namespace: longhorn-system
          port: 80
