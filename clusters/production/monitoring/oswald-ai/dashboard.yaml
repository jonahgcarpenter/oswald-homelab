            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (gateway, user_id) (\n  increase(oswald_user_requests_total[$__range])\n)\n+\nsum by (gateway, user_id) (\n  (oswald_user_requests_total unless oswald_user_requests_total offset $__range) > bool 0\n)",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Total per User (selected range)",
          "transformations": [
            {
              "id": "groupingToMatrix",
              "options": {
                "columnField": "gateway",
                "rowField": "user_id",
                "valueField": "Value"
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Total",
                "mode": "reduceRow",
                "reduce": {
                  "reducer": "sum"
                }
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {},
                "includeByName": {},
                "indexByName": {},
                "renameByName": {
                  "Total": "Total",
                  "discord": "Discord",
                  "imessage": "iMessage",
                  "user_id\\gateway": "User_ID"
                }
              }
            }
          ],
          "type": "table"
