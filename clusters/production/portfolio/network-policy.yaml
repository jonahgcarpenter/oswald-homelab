apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: portfolio-lockdown
spec:
  endpointSelector:
    matchLabels:
      app: portfolio
  ingress:
    # Allow external traffic (from your Cloudflare Tunnel/Ingress Controller)
    # to reach the Go web server on port 8080
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": "cloudflare-tunnel"
            "app": "cloudflare-tunnel"
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # Allow DNS resolution (Required to find Loki's service name)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": "kube-system"
            "k8s-app": "kube-dns"
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"

    # Allow communication ONLY to the Loki service in the monitoring namespace
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": "monitoring"
      toPorts:
        - ports:
            - port: "3100"
              protocol: TCP
