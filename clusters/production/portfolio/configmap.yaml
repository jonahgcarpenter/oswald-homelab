    # Oswald-AI [repo](https://github.com/jonahgcarpenter/oswald-ai)

    ## Overview

    My homelab needed a brain and a sense of humor. But I don't want some generic wrapper or to give Sam Altman all my money. The goal was to create a fully local, uncensored, unforgiving AI. As it turns out keeping the model fully uncensored without training your own model is the most complex part.

    I built a complete V1 using **Python, LangChain, and MCP**, which featured fully operational RAG (Retrieval-Augmented Generation) and tool use. It worked well, but "working" isn't the same as "optimal." 

    After OpenClaw released, I realized my agentic architecture needed a massive overhaul. They had built the censored version of what I was attempting to create months before—in TypeScript, of all languages. I decided to tear down the functional Python build, and rewite everything in Go because I like the langauge more

    ## Architecture

    - **Backend:** I have recently been loving Golang. The compiler yells at you before you push garbage to prod, and it compiles to a single binary, meaning the Docker containers are tiny compared to Python. I know Bun exists for JavaScript/TypeScript so I could really just copy OpenClaw, but that's no fun. RAM is also way too expensive to be running JavaScript on the backend, what's wrong with you...
    - **The Pipeline:** The old two-stage router model is dead. Oswald now operates on a single iterative agent loop backed by self-hosted Ollama. It dynamically evaluates prompts, executes tool calls—like pulling real-time web intelligence via SearXNG or managing memory—and synthesizes everything into a brutally honest final response in one smooth pass.
    - **Multimodal:** He can see now. I added image processing support so he can roast whatever screenshots or photos you send him.
    - **Interfaces:** Since the GPU was donated by a friend, I felt obligated to give them access to Oswald. It started with Discord since it's widely used, but the gateway architecture has expanded. You can now reach him via Discord, native iMessage, or through a WebSocket gateway (Frontend TBD????).

    ## The Memory System

    Oswald is no longer a goldfish. Ditching the stateless design was the biggest leap forward. To handle multi-turn, multi-user workloads without bleeding my context into my friends' chats, Oswald uses a custom three-tier memory architecture:
    1. **Session Memory:** Standard short-term context for the active conversation.
    2. **Persistent User Facts:** Long-term memory where Oswald actively extracts and saves facts about specific users to his database. He remembers who you are and tailors the abuse accordingly.
    3. **The Soul File:** A core personality file that dictates his system prompt and baseline behavior, which Oswald can edit using a tool call.

    ## My Plan

    Up until now, Oswald has mostly been a way to dive deep into local LLMs and roast my friends in Discord. The actual endgame, though, is a fully local, unapologetically sarcastic digital butler. The vision is a zero-dependency system that can orchestrate my homelab, remember exactly who I am, and send a birthday text to my mom to save my skin, all while maintaining a brutally honest sense of humor.

  aprils-lil-pugs.md: |
    # April's Lil Pugs [repo](https://github.com/jonahgcarpenter/aprilslilpugs) | [live](https://aprilslilpugs.com)

    ## Overview

    April's Lil Pugs is a full-stack web platform built for a dog breeding business to manage litters, puppy listings, galleries, waitlist inquiries, and site administration. Rather than using a generic site builder or breeder-specific SaaS product, I built a custom React and Go application tailored to the actual operational needs of the business.

    Although much of the platform is standard CRUD functionality, the project became more interesting in two areas that matter most for this type of site: handling large volumes of uploaded images efficiently and delivering a fully self-hosted live puppy camera feed with no cloud streaming dependencies.

    ## Architecture

    - **Frontend:** React, TypeScript, Vite, Tailwind CSS
    - **Backend:** Go, Gin, PostgreSQL
    - **Storage:** Local file storage for uploads and generated media
    - **Streaming Pipeline:** Custom Go RTMP/RTMPS ingest server, FFmpeg, Cheap Eufy RTSP camera

    ## Image Handling

    Breeder sites are inherently media-heavy, and raw phone photos are far too large to serve directly without hurting performance and storage costs. The backend processes uploads before storing them, reducing image size and stripping unnecessary metadata so galleries stay fast while preserving enough quality for detailed puppy photos.

    This keeps the site lightweight without introducing third-party image hosting or CDN dependencies, which was an intentional design choice for simplicity and control.

    ## Self-Hosted Live Streaming

    The standout feature of the platform is a fully self-hosted puppy camera feed. Instead of embedding YouTube or relying on an external streaming service, I built live streaming directly into the application stack using Go.

    The server accepts RTMP and RTMPS ingest, manages stream state, and publishes HLS playback for the frontend. That means the live camera operates entirely on infrastructure I control, with no cloud video vendor, no platform moderation issues, and no dependency on third-party uptime or policy changes.

    For the business, the live stream became more than a novelty feature. It gives prospective buyers a real-time view into the play pen, increases trust, and creates a stronger connection to the puppies long before pickup day.

    ## Why It Matters

    At a glance, this is a niche business website. In practice, it is a production full-stack system that combines administrative workflows, media processing, and custom live video infrastructure in a single application.

    The CRUD side keeps the business running day to day. The custom streaming stack is what makes the project technically distinctive.
