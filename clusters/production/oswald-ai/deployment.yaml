apiVersion: apps/v1
kind: Deployment
metadata:
  name: oswald-ai
  labels:
    app: oswald-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: oswald-ai
  template:
    metadata:
      labels:
        app: oswald-ai
    spec:
      # Block API token and kernel syscalls
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "Always"
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: oswald-ai
          image: ghcr.io/jonahgcarpenter/oswald-ai/oswald-ai:v3.0.0-beta.1

          # Enforcing Principle of Least Privilege
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          envFrom:
            - configMapRef:
                name: oswald-ai-config
            - secretRef:
                name: oswald-ai-secret

          # Mounting the storage directory
          volumeMounts:
            - name: storage-volume
              mountPath: /home/oswald-ai/data/accounts
              subPath: accounts
            - name: storage-volume
              mountPath: /home/oswald-ai/data/memory
              subPath: memory

      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: oswald-ai-pvc
