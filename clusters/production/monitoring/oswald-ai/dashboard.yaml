apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-oswald-ai
  labels:
    grafana_dashboard: "1"
data:
  oswald-ai-dashboard.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": true,
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "title": "Requests / min",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum(rate(oswald_requests_total[5m])) * 60",
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "reqpm"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          }
        },
        {
          "id": 2,
          "title": "Active Requests",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum(oswald_active_requests)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "Broker Queue Depth",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "oswald_broker_queue_depth",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "title": "Tool Error Rate / min",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum(rate(oswald_tool_failures_total[5m])) * 60",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "title": "Requests by Gateway",
          "type": "barchart",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (gateway) (increase(oswald_requests_total[$__range]) + ((oswald_requests_total unless oswald_requests_total offset $__range) > bool 0))",
              "format": "table",
              "instant": true,
              "legendFormat": "{{gateway}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "showValue": "always"
          },
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "indexByName": { "Value": 1, "gateway": 0 },
                "renameByName": { "Value": "requests", "gateway": "gateway" }
              }
            }
          ]
        },
        {
          "id": 6,
          "title": "Request Outcomes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (result) (rate(oswald_requests_total[5m]))",
              "legendFormat": "{{result}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "decimals": 2,
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 7,
          "title": "P50 / P95 Request Latency by Gateway",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.50, sum by (le, gateway) (rate(oswald_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p50 {{gateway}}",
              "refId": "A"
            },
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.95, sum by (le, gateway) (rate(oswald_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95 {{gateway}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 2, "unit": "s" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 8,
          "title": "P95 Broker Queue Wait",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.95, sum by (le, gateway) (rate(oswald_broker_queue_wait_seconds_bucket[5m])))",
              "legendFormat": "{{gateway}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 3, "unit": "s" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 9,
          "title": "Top Chatters",
          "type": "table",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 20 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "topk(15, sum by (user_id) (increase(oswald_user_requests_total[$__range]) + ((oswald_user_requests_total unless oswald_user_requests_total offset $__range) > bool 0)))",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "options": { "showHeader": true },
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "indexByName": { "Value": 1, "user_id": 0 },
                "renameByName": { "Value": "requests", "user_id": "user_id" }
              }
            }
          ]
        },
        {
          "id": 10,
          "title": "Top Tools",
          "type": "table",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 20 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sort_desc(sum by (tool) (increase(oswald_tools_total{result=\"success\"}[$__range]) + ((oswald_tools_total{result=\"success\"} unless oswald_tools_total{result=\"success\"} offset $__range) > bool 0)))",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "options": { "showHeader": true },
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "indexByName": { "Value": 1, "tool": 0 },
                "renameByName": { "Value": "calls", "tool": "tool" }
              }
            }
          ]
        },
        {
          "id": 11,
          "title": "Top Errors",
          "type": "table",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 20 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sort_desc(sum by (component, type) (increase(oswald_errors_total[$__range])))",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "options": { "showHeader": true },
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "indexByName": { "Value": 2, "component": 0, "type": 1 },
                "renameByName": { "Value": "count", "component": "component", "type": "type" }
              }
            }
          ]
        },
        {
          "id": 12,
          "title": "Tool Usage Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 28 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (tool) (rate(oswald_tools_total[5m]))",
              "legendFormat": "{{tool}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 2, "unit": "reqps" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 13,
          "title": "Tool Errors / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 28 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (tool, error_type) (rate(oswald_tool_failures_total[5m]))",
              "legendFormat": "{{tool}} / {{error_type}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 3, "unit": "reqps" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 14,
          "title": "Model Throughput (tokens/sec)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 36 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.50, sum by (le, model) (rate(oswald_llm_tokens_per_second_bucket[5m])))",
              "legendFormat": "p50 {{model}}",
              "refId": "A"
            },
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.95, sum by (le, model) (rate(oswald_llm_tokens_per_second_bucket[5m])))",
              "legendFormat": "p95 {{model}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 1, "unit": "short" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 15,
          "title": "Time To First Token",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 36 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.50, sum by (le, model) (rate(oswald_llm_time_to_first_token_seconds_bucket[5m])))",
              "legendFormat": "p50 {{model}}",
              "refId": "A"
            },
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.95, sum by (le, model) (rate(oswald_llm_time_to_first_token_seconds_bucket[5m])))",
              "legendFormat": "p95 {{model}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 2, "unit": "s" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 16,
          "title": "Completion Reasons / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 36 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (model, reason) (rate(oswald_llm_done_reason_total[5m]))",
              "legendFormat": "{{model}} / {{reason}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 2, "unit": "reqps" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 17,
          "title": "Prompt Budget Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 44 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.50, sum by (le, model, kind) (rate(oswald_memory_prompt_budget_utilization_bucket[5m])))",
              "legendFormat": "p50 {{model}} / {{kind}}",
              "refId": "A"
            },
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.95, sum by (le, model, kind) (rate(oswald_memory_prompt_budget_utilization_bucket[5m])))",
              "legendFormat": "p95 {{model}} / {{kind}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 2, "unit": "percentunit" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 18,
          "title": "Memory Compactions",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 44 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "rate(oswald_memory_compactions_total[5m])",
              "legendFormat": "compactions",
              "refId": "A"
            },
            {
              "datasource": "prometheus",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(oswald_memory_compacted_turn_pairs_bucket[5m])))",
              "legendFormat": "p95 compacted pairs",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 2, "unit": "short" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 19,
          "title": "Inbound Message Rate by Kind",
          "type": "barchart",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 52 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (gateway_kind) (label_join(increase(oswald_gateway_messages_received_total[$__range]) + ((oswald_gateway_messages_received_total unless oswald_gateway_messages_received_total offset $__range) > bool 0), \"gateway_kind\", \" / \", \"gateway\", \"kind\"))",
              "format": "table",
              "instant": true,
              "legendFormat": "{{gateway_kind}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 0, "unit": "short" },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "showValue": "always"
          },
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "indexByName": { "Value": 1, "gateway_kind": 0 },
                "renameByName": { "Value": "requests", "gateway_kind": "gateway_kind" }
              }
            }
          ]
        },
        {
          "id": 20,
          "title": "Unsupported Attachments / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 52 },
          "targets": [
            {
              "datasource": "prometheus",
              "expr": "sum by (gateway, reason) (rate(oswald_request_unsupported_attachments_total[5m]))",
              "legendFormat": "{{gateway}} / {{reason}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "decimals": 2, "unit": "reqps" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 21,
          "title": "Namespace Logs: oswald-ai",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 60 },
          "targets": [
            {
              "datasource": "loki",
              "expr": "{namespace=\"oswald-ai\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ],
      "schemaVersion": 38,
      "tags": ["oswald-ai"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h", "2h", "1d"
        ],
        "time_options": [
          "5m", "15m", "1h", "6h", "12h", "24h", "2d", "7d", "30d"
        ]
      },
      "timezone": "browser",
      "title": "Oswald AI",
      "uid": "oswald-ai-overview",
      "version": 1
    }
