apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshots
spec:
  cron: "0 1 * * *"
  task: "snapshot"
  groups:
    - backups
  retain: 5
  concurrency: 1
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-backups
spec:
  cron: "0 2 * * MON"
  task: "backup"
  groups:
    - backups
  retain: 10
  concurrency: 1
