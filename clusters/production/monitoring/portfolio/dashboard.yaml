apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-portfolio
  labels:
    grafana_dashboard: "1"
data:
  portfolio-dashboard.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "panels": [],
          "title": "Portfolio Application Health",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "id": 2,
          "title": "Active SSE Connections",
          "type": "stat",
          "targets": [
            {
              "expr": "portfolio_active_sse_connections{job=\"portfolio-exporter\"}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 18,
            "x": 6,
            "y": 1
          },
          "id": 3,
          "title": "Page Views Rate (per Section)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(portfolio_http_requests_total{job=\"portfolio-exporter\"}[5m])",
              "legendFormat": "{{section}}",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "id": 4,
          "panels": [],
          "title": "Go Runtime Performance",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 10
          },
          "id": 5,
          "title": "Heap Memory Utilization",
          "type": "timeseries",
          "targets": [
            {
              "expr": "go_memstats_heap_inuse_bytes{job=\"portfolio-exporter\"}",
              "legendFormat": "In Use",
              "refId": "A"
            },
            {
              "expr": "go_memstats_heap_idle_bytes{job=\"portfolio-exporter\"}",
              "legendFormat": "Idle",
              "refId": "B"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 10
          },
          "id": 6,
          "title": "Active Goroutines",
          "type": "timeseries",
          "targets": [
            {
              "expr": "go_goroutines{job=\"portfolio-exporter\"}",
              "legendFormat": "Goroutines",
              "refId": "A"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 18
          },
          "id": 7,
          "panels": [],
          "title": "Container & Process System",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 19
          },
          "id": 8,
          "title": "CPU Usage Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job=\"portfolio-exporter\"}[5m])",
              "legendFormat": "CPU Time",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 19
          },
          "id": 9,
          "title": "Resident Memory (RSS)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=\"portfolio-exporter\"}",
              "legendFormat": "RSS Bytes",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["portfolio", "golang"],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Portfolio Metrics",
      "uid": "portfolio-metrics-01",
      "version": 1
    }
