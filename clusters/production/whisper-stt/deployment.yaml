apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper-stt
  labels:
    app: whisper-stt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper-stt
  template:
    metadata:
      labels:
        app: whisper-stt
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: whisper-stt
          image: lscr.io/linuxserver/faster-whisper:3.1.0
          securityContext:
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 10300
          resources:
            # requests:
            #   cpu: "2"
            #   memory: "500Mi"
            # limits:
            #   cpu: "4"
            #   memory: "2Gi"
          env:
            - name: TZ
              value: "Etc/UTC"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: WHISPER_MODEL
              value: "tiny-int8"
            - name: WHISPER_BEAM
              value: "1"
            - name: WHISPER_LANG
              value: "en"
            - name: OMP_NUM_THREADS
              value: "4"
          volumeMounts:
            - name: whisper-config
              mountPath: /config
            - name: temp-data
              mountPath: /tmp
            - name: run-data
              mountPath: /run
      volumes:
        - name: whisper-config
          persistentVolumeClaim:
            claimName: whisper-pvc
        - name: temp-data
          emptyDir: {}
        - name: run-data
          emptyDir: {}
