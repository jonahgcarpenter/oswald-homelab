          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (gateway, kind) (\n  increase(oswald_requests_total[$__range])\n  + ((oswald_requests_total unless oswald_requests_total offset $__range) > bool 0)\n)",
              "format": "time_series",
              "instant": true,
              "legendFormat": "{{gateway}} - {{kind}}",
              "refId": "A"
            }
          ],
          "title": "Total by Type (selected range)",
          "type": "barchart"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Total number of agent-bound request by canonical_id",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "footer": {
                  "reducers": []
                },
                "inspect": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "short"
            }
          },
