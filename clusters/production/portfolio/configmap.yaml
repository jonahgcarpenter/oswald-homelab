  about-me.md: |
    # About Me

    Howdy, my name is Jonah Carpenter. I am a Software Engineer with a focus on infrastructure, DevOps, and backend development. I am worried about the whole pie, writing robust scalable full-stack applications, and ironing out the CI/CD pipelines that deploy the applications on solid infrastructure

    I thrive in the space where software and systems engineering intersect. I actively design and manage a comprehensive, self-hosted bare-metal Kubernetes environment utilizing technologies like Proxmox, Talos, and Flux CD, backed by enterprise-grade network engineering

    I enjoy tackling complex, end-to-end challenges. Whether I am architecting memory-driven AI agents, engineering real-time transcription and translation platforms, or building full-stack web applications with integrated live-streaming capabilities, I am driven by a desire to understand how systems work under the hood and a commitment to building infrastructure that is as arousing as the code it runs

    ## Why the portfolio?

    LinkedIn has become nothing but AI slop, ignorant attention seeking post, and paywall blocked features. Seeing as I never took my profile seriously, and half of the job postings on there are probably fake to begin with it was time to just delete the app. But I know that most recruiters or hiring managers will not care to look on github, so I need somewhere to display my work. This is where the over-engineered portfolio comes in...

    I had a few basic requirements when starting this:

    - To avoid creating another shity react app, and the fact that I hate frontend anyways. It had to be very minimal
    - Focus on my strengths: Backend, DevOps
    - Has to be easy to update, I shouldn't have to be in a terminal to fix a spelling error

    For a very short explanation it works like this. The backend is a Go server that reads markdown files from a Kubernetes configmap, caches them for quick loading times, and handles Server-Side Events (SSE) for instant reloading. The frontend is a single HTML file that displays these markdown files and listens for those SSE messages. I also added a metrics endpoint for tracking page visits, active connections, and other basic OS/Go metrics. Then to top it all off I display the live flux-system namespace logs from the Kubernetes cluster this application lives on. Now don't get excited...I wasn't stupid enough to give this application Kubernetes API access, I am simply using Loki's API and a polling interval. Yes you will see some warnings or deprecation messages, but "If it ain't broke, don't fix it"
