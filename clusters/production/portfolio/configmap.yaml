    # Resume

    ## Education

    **University of Mississippi** | May 2025
    Bachelor’s in Computer Science

    **Itawamba Community College** | May 2022
    Associate’s in Computer Science

    ## Experience

    **Universal Asset Management** | Shannon, MS
    Software Engineer | April 2026 - Present
    Jr Web/ERP Developer | April 2025 – April 2026


    - Established a dedicated Kubernetes testing infrastructure on Proxmox, providing an isolated Talos environment to validate complex builds of the live translation platform before release
    - Leading the architecture of CALC-Translation
    - Utilizing Terraform and Ansible to manage VPS, VMs, and the staging cluster
    - Provided IT support for internal staff, while maintaining the company's legacy Laravel ERP system and automating daily logistics workflows
    - Redid the companies public facing webpage with a much needed facelift, and the added functionality to manage events hosted by the company

    ## Technical Skills

    **Infrastructure & Orchestration:** Kubernetes, Docker, Terraform, GitHub Actions, FluxCD, Ansible, Proxmox, Linux, GCP, DigitalOcean, TrueNAS, UnRaid

    **Programming Languages:** Python, Go (Golang), Bash, JavaScript, TypeScript, PHP, C++, SQL

    **Observability & Monitoring:** Prometheus, Grafana, Loki, Hubble

    **Frameworks & Tools:** React, FastAPI, Gin, Electron, PostgreSQL, LangChain, Laravel, Angular, Express

    ## Projects

    I am going to keep these overviews brief, as they only serve as high level explanations for the uninitiated. The deeper more tecnical explinations can be found on each projects respective page. This list is comprised of my currently in production applications, as always there is much more dead weight on my github where any and everything I build is in a public repo

    **CALC-Translation** | Python, React

    A real-time transcription and translation platform designed to provide low-latency (<1000ms), accurate captions or translations for meetings in multiple languages. It features dual operation modes—integrating directly with Zoom or running standalone for local audio—alongside helpful tools like AI-generated meeting summaries and Microsoft 365 calendar synchronization. Additionally, it utilizes a "Smart Backfill" feature to instantly translate past session history, ensuring that users who join late or switch languages do not lose any context

    **Homelab** | Kubernetes, Proxmox

    Personal server and home network setup. The infrastructure relies on robust UniFi networking hardware alongside dedicated compute nodes, such as a Proxmox server, a Talos mini-PC cluster, and a Home Assistant Yellow. It is designed to host a wide ecosystem of self-hosted applications and infrastructure tools, supporting technologies like Kubernetes, TrueNAS, Grafana, and various AI and home automation services

    **Oswald-AI** | Golang

    An uncensored, witty AI agent integrated directly into Discord, iMessage, and WebSocket gateways to serve as a highly capable digital manservant. Built in pure Go, it runs a single iterative agent loop backed by self-hosted Ollama that dynamically executes tool calls to gather real-time SearXNG web intelligence and manage user profiles. Fully local and zero cloud dependencies, it features a three-tier stateful memory architecture and multimodal image processing to deliver highly contextual, brutally honest answers with a distinct touch of unhinged humor.

    **April's Lil Pugs** | TypeScript, Golang

    Full-stack website developed to manage dog breeding operations, puppy galleries, and customer interactions. Built with a React frontend and a Go backend backed by a PostgreSQL database, the platform is mostly a boring CRUD app. Mainly, it features a self hosted live camera feed of the play pen using zero cloud dependencies.
