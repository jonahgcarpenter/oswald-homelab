apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alert-manager-hubble
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: hubble.rules
      rules:
        # Lateral Movement / Policy Denials
        - alert: HubblePolicyDenied
          expr: sum(rate(hubble_drop_total{reason="Policy denied"}[5m])) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High rate of policy drops detected in the cluster"
            description: 'The cluster is experiencing a surge in Policy Denied dropped packets ({{ $value | printf "%.1f" }} per second).'

        # Network Reconnaissance / Port Scanning
        - alert: HubblePortScanDetected
          expr: sum by (source_workload) (rate(hubble_flows_processed_total{verdict="DROPPED"}[5m])) > 50
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Potential port scan detected from {{ $labels.source_workload }}"
            description: 'Workload {{ $labels.source_workload }} has a rapidly surging rate of dropped flows ({{ $value | printf "%.1f" }} per second), indicating network reconnaissance or unauthorized scanning.'

        # Command & Control / Exfiltration (DNS)
        - alert: HubbleHighNXDomainRate
          expr: sum by (source_workload, query) (rate(hubble_dns_responses_total{rcode="NXDomain"}[5m])) > 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High NXDomain rate for {{ $labels.source_workload }}"
            description: "Workload {{ $labels.source_workload }} is aggressively querying a non-existent domain ({{ $labels.query }}). This is highly indicative of malware C2 beaconing or a misconfigured app."

        # Layer 7 Credential Stuffing / Exploit Attempts
        - alert: HubbleHttpErrorSpike
          expr: sum by (source_workload, destination_workload) (rate(hubble_http_responses_total{status=~"401|403"}[5m])) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "HTTP 401/403 spike from {{ $labels.source_workload }}"
            description: "High rate of HTTP authorization/authentication errors between {{ $labels.source_workload }} and {{ $labels.destination_workload }}. Possible privilege escalation or credential stuffing attempt."
