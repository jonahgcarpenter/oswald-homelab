apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "security-starter-pack"
spec:
  kprobes:
    # Monitors attempts to read critical system files.
    # On Talos, seeing a standard pod touch these is a major red flag.
    - call: "security_file_permission"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/shadow" # Password hashes
                - "/etc/kubernetes/pki" # Cluster certs
                - "/root/.ssh" # SSH keys
          matchActions:
            - action: Post

    # Monitors every new TCP connection attempt.
    # Vital for catching reverse shells or pods "calling home."
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchActions:
            - action: Post

    # Detects when a process changes its security credentials.
    # This fires if a process gains root-like capabilities (CAP_SYS_ADMIN).
    - call: "commit_creds"
      syscall: false
      args:
        - index: 0
          type: "cred"
      selectors:
        - matchActions:
            - action: Post

    # Monitors when common "attacker" binaries are executed.
    # Replaced "In" with "Equal" as it supports multiple values.
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/curl"
                - "/usr/bin/wget"
                - "/usr/bin/nc"
                - "/usr/bin/ncat"
          matchActions:
            - action: Post
