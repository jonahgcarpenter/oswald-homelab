    # April's Lil Pugs [repo](https://github.com/jonahgcarpenter/aprilslilpugs)

    ## Overview

    At its core, a website for a dog breeder is a standard CRUD application: manage litters, update puppy statuses, and handle a waitlist. I built this platform for my mom's side business to replace the standard, clunky alternatives. But instead of just spinning up a generic WordPress template or paying for a bloated SaaS platform, I custom-engineered a Go and React solution that handles heavy media and live video directly on my own infrastructure.

    While the basic data operations are straightforward, I focused the heavy lifting on the two most demanding aspects of a breeder's site: high-volume image storage and real-time video streaming.

    ## Architecture

    - **Backend:** Golang, NGINX RTMS/HLS
    - **Frontend:** Vite React with TailwindCSS
    - **Object Storage:** MinIO S3
    - **Camera:** Cheap Eufy RTSP security camera

    ## S3 Object Storage

    When you run a breeder platform, you are managing of high-resolution puppy pictures and documents. Shoving binary image data into a database is a rookie mistake (which I made at one point in this project) that destroys performance, and paying AWS for S3 buckets for a small side-business is a waste of money.

    To solve this, I utilize **MinIO**, a high-performance, S3-compatible object storage server running entirely at home. But now that MinIO is officially deprecated I think I will go back to local storage to reduce the extra complexity. There are also some other issues when dealing with images which I solved using the backend. Go doesn't just pass URLs around. I wrote dedicated utilities to handle multipart file parsing, secure image processing, and direct bucket interactions over the S3 protocol.

    ## Live Stream

    Static pictures only go so far when prospective buyers are picking out a puppy. Originally I was running the streams through youtube, but with a silent time limitation it kept taking stream down after 24-48 hours. This meant I had to restart the stream manually and update the live url on facebook which got annoying quick. So I engineered a fully integrated live-streaming pipeline

    We start with an RTSP camera at my parents house. Thankfully I began my homelab journey while I was still living at home years ago, so they have their own server because I got them hooked on Home Assistant. To get the video from their house to mine I setup a small VM whos sole purpose is to connect to a **VPN** tunnel and run an **FFMPG** service that encodes the RTSP stream and send it to a **RTMP** server. I personally don't like using a full VM here but it is the only way to allow the VM access to a PCI device as far as I know. Then I simple set these services to autostart which will come in handy later

    Now on my end of the bargen, I can injest the video stream and convert it to **HLS** to display on the website. When this project started I found a NGINX RTMP server someone else wrote so I have been using that, but before the next litter this flow needs to be cleaned up. I will end up rewriting the RTMP server directly within the **Go** backend of the application and simply integrate some form of key exchange to ensure they are the sole injest source. This will help remove the extra VPN step for a cleaner setup

    You will notice this still has lots of moving peices, which means this does go down from time to time. Home Assistant provides an API, and you can integrate your proxmox server to allow for restarting VMs or viewing status within the platform. The solution is that the backend continuosly checks if the stream is active (not returning 404 on request), if the stream does go down it can auto-restart the VM for me. Because most of the time this is a simple hickup due to the amount of moving parts it will usually fix the issue, otherwise it will send me a notification that the restart did not fix the issue and it requires human intervention

    With this solution I have drascticlly increased uptime when the livestream is active and made it super each to share for public access. And has become the main attraction to her side buisness even for people not buying puppies.
