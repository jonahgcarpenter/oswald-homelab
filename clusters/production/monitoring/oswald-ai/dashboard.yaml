          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Total number of agent-bound request by gateway",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
