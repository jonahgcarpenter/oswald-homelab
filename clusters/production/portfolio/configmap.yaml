    # Oswald-AI [repo](https://github.com/jonahgcarpenter/oswald-ai)

    ## Overview

    My homelab needed a brain and a sense of humor. But I dont want some generic wrapper or to give Sam Altman all my money. The goal was to create an uncensored, unforgiving AI but this creates some challenges on it's own

    I have gone through 2-3 different architectural plans for this project but to say I know nothing about AI agentic architecture would be an understatement. I started with **LangChain, Python and MCP** but this did not work as well as expected. Then OpenClaw released and I realized I was doing it all wrong, they had build the censored version of what I was attempting to create months before, in TypeScript of all languages. Needless to say this project is always changing

    ## Architecture

    As I said this project is always changing, at the time of writing this the master branch is still the Python version. But I am currently exploring a new idea based on the principles OpenClaw opened my eyes too. At the time of writing the Go version is what I swore to destory, an Ollama wrapper, and for the time being everyone seems to find the unhinged behavior of a simple uncensored model enjoyable. The goal is to return Oswald to his agentic glory given these plans

    - **Backend:** I have recently been loving **Golang**, the compiler yells at you before you push garage to prod, and it compiles to a binary meaning the Docker containers are tiny compared to Python. I know Bun exist for JavaScript/TypeScript so I could really just copy OpenClaw, but thats no fun. RAM is also way to expensive to be running JavaScript on the backend whats wrong with you?
    - **Agent:** I like the markdown idea here. Its the best format to give to LLMs and it means I dont have to handle anything database related
    - **Tools:** MCP is the only real option, but finding the best open source MCP servers gets a little annoying. I went down the hand-written tools road before and that was a nightmare
    - **Interfaces:** Since the GPU was donated by a friend I felt obligated to give them access to Oswald. Discord was the only real choice since its widely used, pending age verificiation, and I really liked Grok's UX. Simply type `@Oswald <prompt>` and you're off to the races

    ## The Plan

    Most of this projects rewrite is up in the air. So here is what I want and how I think I can make it happen

    Oswald should be handle multiuser workloads. I don't want to get my friends memories. My idea here is exploring keyd markdown files for memory storage, then some form of indexing to keep this quick and light on resources. That way each user has their own contextual history and limits and allows Oswald to interact with each person on a personal level similar to the evil coperate versions

    Web search is a big issue here given his uncensored nature, additionally different models have their own specialities. I think something like a router model at the gate will help. At the very beginning of the interaction I want a tiny model to route traffic depending on the prompt category, complex, coding, unsafe, or simple. Different models for different task and this means I can apply gaurdrails for uncensored prompts which is nice when giving the model access to direct search functionality

    I am generally going to utilize this project more than anyone else, which means I have plans just for my use.  Direct access to my homelab, or smart home would be nice, as I not a fan of Alexa+. STT and TTS functionality is a must have, but the hardware is going to get annoying because I really like the whole home audio functionality from Alexa so that can't be lost. I continue to see more and more about "jailbreaking" old Alexa hardware so maybe that is an idea compared to buying a whole new fleet of smart speakers
