apiVersion: apps/v1
kind: Deployment
metadata:
  name: alp-web
  labels:
    app: alp-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alp-web
  template:
    metadata:
      labels:
        app: alp-web
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: alp-web
          image: ghcr.io/jonahgcarpenter/aprilslilpugs/aprilslilpugs:v2.0.4
          ports:
            - containerPort: 4000

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          envFrom:
            - secretRef:
                name: alp-web-secrets
          volumeMounts:
            - name: storage-volume
              mountPath: /app/storage
            - name: tmp-volume
              mountPath: /tmp

      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: aprilslilpugs-pvc
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alp-web-tunnel
  labels:
    app: alp-web-tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alp-web-tunnel
  template:
    metadata:
      labels:
        app: alp-web-tunnel
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          args:
            - tunnel
            - --no-autoupdate
            - run

          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alp-web-tunnel-credentials
                  key: TUNNEL_TOKEN

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
