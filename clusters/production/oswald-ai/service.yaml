apiVersion: v1
kind: Service
metadata:
  name: oswald-ai-service
  namespace: oswald-ai
  labels:
    app: oswald-ai
spec:
  type: ClusterIP
  selector:
    app: oswald-ai
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: oswald-ai-webhook
  namespace: oswald-ai
  labels:
    app: oswald-ai
spec:
  type: LoadBalancer
  loadBalancerIP: "192.168.4.235"
  selector:
    app: oswald-ai
  ports:
    - name: http
      protocol: TCP
      port: 8090
      targetPort: 8090
