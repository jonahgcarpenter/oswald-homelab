            "xTickLabelRotation": 0,
            "xTickLabelSpacing": 0
          },
          "pluginVersion": "13.0.1",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (gateway) (increase(oswald_requests_total[$__range]) + ((oswald_requests_total unless oswald_requests_total offset $__range) > bool 0))",
              "format": "time_series",
              "instant": true,
              "legendFormat": "{{gateway}}",
              "refId": "A"
            }
          ],
          "title": "Total by Gateway (selected range)",
          "type": "barchart"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "description": "Total number of agent-bound request by type (image, text, image + text) and gateway",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
