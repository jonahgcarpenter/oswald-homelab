  about-me.md: |
    # About Me

    Howdy, I'm Jonah Carpenter. I'm a Software Engineer who actually cares about the hardware my code runs on. I handle everything from writing the backend logic to building the deployment pipelines so it doesn't crash in production.

    Instead of using corporate buzzwords about "intersecting spaces," I just build stuff. At home, that means running a bare-metal Kubernetes cluster, Proxmox, and Unifi networking gear meant for a small business.

    Whether I'm writing completely local uncensored AI agents from scratch, building custom video pipelines, or racking more servers, I'm driven by a need to understand exactly how things work under the hood. My ultimate goal is simple: build infrastructure that is as arousing as the code it runs.

    ## Self-Hosting

    In 2020, I started messing around with Home Assistant. I just wanted to automate a robot vacuum based on our Life360 locations, but it turned out to be the gateway drug to a full-blown obsession. What started as a single localized automation to solve a minor inconvenience has snowballed into the small AWS region in my house. 

    As my technical skills grew, so did my distrust of big tech. I became increasingly wary of handing my personal data over to the cloud. Now, I self-host practically everything. I even maintain a secondary homelab for my parents because they became dependent after I spoon-fed them Home Assistant for all those years. For me, self-hosting isn't just a hobby anymore; it's a completely local, privacy-first lifestyle.

    ## Software Engineering

    While I will always have a soft spot for DevOps and infrastructure, my core discipline is Software Engineering. Racking servers and building out a bare-metal cluster is fun, but I like extending my skills for others to use, and my friends and family couldn't tell you the difference between HTTP and HTTPS.

    I don't just spin up pre-built containers, that would be no fun. When an existing solution doesn't cut it, I build it myself from the ground up. As a strict requirement, everything I write for myself must be fully local and free. I mean, why else would I have set all this infrastructure up just to continue handing out my data or paying fees?

    Lastly, I take immense pride in my personal projects, no matter how stupid the premise might be. I will happily spend an embarrassing amount of time agonizing over the perfect directory structure, religiously enforcing formatters, and ensuring the codebase is actually diagnosable for when "future me" inevitably has to update it. And because everything I build is ultimately destined to run on my own bare-metal Kubernetes cluster, security is never an afterthought. If an app or service is going to live on my infrastructure, it's going to be locked down.

    ## Contact

    I recently deleted my LinkedIn and replaced my account with this portfolio. I honestly just got tired of all the AI slop, attention-seeking posts, and scams. By far the best way to reach me is via my email in the footer of this page.

